name: Bench

on:
  push:
    branches: [main, refactor]
    paths:
      - "benchmarks/**"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/benchmark.yml"
  schedule:
    - cron: "0 3 * * *" # Nightly at 03:00 UTC
  workflow_dispatch: # Manual trigger

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  asv:
    name: "ASV benchmarks"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ASV needs full git history

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - name: Install dependencies
        run: uv sync --group dev --extra mesh --extra atm

      - name: Build native extension
        run: uv run maturin develop --release

      - name: Patch namespace package
        run: bash .github/scripts/patch_namespace.sh

      - name: Download previous ASV results
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          name: benchmark-results
          path: .asv/results
          workflow: benchmark.yml
          if_no_artifact_found: warn

      - name: Register ASV machine
        run: uv run asv machine --yes

      - name: Run ASV benchmarks
        run: uv run asv run --quick --set-commit-hash $(git rev-parse HEAD)

      - name: Publish ASV HTML dashboard
        run: uv run asv publish

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .asv/results
          retention-days: 90
          overwrite: true

      - name: Upload HTML dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-dashboard
          path: .asv/html
          retention-days: 90
          overwrite: true

  # Trigger docs rebuild so the benchmark dashboard is picked up
  docs:
    needs: asv
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: write
