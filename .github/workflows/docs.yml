name: Docs

on:
  push:
    branches: [main, refactor]
  workflow_call: # Allow other workflows (e.g. benchmark) to trigger a rebuild
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group docs

      - name: Build native extension
        run: uv run maturin develop

      - name: Build Sphinx documentation
        run: uv run --group docs sphinx-build docs docs/_build/html -W --keep-going

      - name: Download benchmark dashboard
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          name: benchmark-dashboard
          path: docs/_build/html/benchmarks
          workflow: benchmark.yml
          if_no_artifact_found: warn

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
