name: Test

on:
  push:
    branches: [main, refactor]
  pull_request:
    branches: [main, refactor]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Unit tests with coverage, uploaded to Codecov.
#
# Core tests (no optional deps) run on the full OS × Python matrix.
# Rust tests run on Ubuntu only (native extension).
# Coverage reports are merged and uploaded once all jobs complete.
# ---------------------------------------------------------------------------

jobs:
  # ── Python unit tests (core — no optional deps) ─────────────────────────
  python-test:
    name: "Test / ${{ matrix.os }} / py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build native extension
        run: uv run maturin develop

      - name: Run unit tests with coverage
        run: >
          uv run pytest test/
          -m "not requires"
          --cov
          --cov-report=xml:coverage-core.xml
          --cov-report=term-missing
          -v --tb=short

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage-core.xml
          retention-days: 1

  # ── Rust tests ──────────────────────────────────────────────────────────
  rust-test:
    name: "Test / Rust (nextest)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - name: Install nextest
        run: cargo install cargo-nextest --locked

      - name: Set up Python (for PyO3 linking)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Rust tests
        run: cargo nextest run --manifest-path src/rust/Cargo.toml

  # ── Upload coverage to Codecov ──────────────────────────────────────────
  upload-coverage:
    name: "Codecov"
    needs: [python-test]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage-core.xml
          flags: core
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
