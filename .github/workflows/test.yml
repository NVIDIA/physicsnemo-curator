name: Test

on:
  push:
    branches: [main, refactor]
  pull_request:
    branches: [main, refactor]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Unit tests with coverage, uploaded to Codecov.
#
# Core tests (no optional deps) run on Ubuntu / Python 3.12.
# Rust tests run on Ubuntu via cargo-nextest.
# Coverage is uploaded to Codecov after the test job completes.
# ---------------------------------------------------------------------------

jobs:
  # ── Python unit tests (core — no optional deps) ─────────────────────────
  python-test:
    name: "Test / Ubuntu / py3.12"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build native extension
        run: uv run maturin develop

      - name: Run unit tests with coverage
        run: >
          uv run pytest test/
          -m "not requires"
          --cov
          --cov-report=xml:coverage.xml
          --cov-report=term-missing
          -v --tb=short

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: core
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Rust tests ──────────────────────────────────────────────────────────
  rust-test:
    name: "Test / Rust (nextest)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - name: Install nextest
        run: cargo install cargo-nextest --locked

      - name: Set up Python (for PyO3 linking)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Rust tests
        run: cargo nextest run --manifest-path src/rust/Cargo.toml
