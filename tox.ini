# tox configuration for testing across Python versions.
#
# The project uses maturin to build a Rust/PyO3 native extension, so each
# tox environment must compile the extension before running tests.
#
# Usage:
#   tox -e py312          # single version
#   tox -e py312,py313    # multiple versions
#   tox                   # all configured versions

[tox]
env_list = py312, py313
min_version = 4.0

[testenv]
# maturin needs Rust + cargo available (installed outside tox).
# The build step compiles the native extension into the tox virtualenv.
deps =
    maturin>=1.0,<2.0
    pytest>=8.0
    pytest-cov>=5.0

commands_pre =
    # Build the native Rust extension into the tox virtualenv.
    # Must NOT use --manifest-path directly — maturin needs the pyproject.toml
    # to pick up module-name = "physicsnemo_curator._lib".
    maturin develop

commands =
    # Run core tests (no optional dependency groups required).
    pytest test/ -m "not requires" -v --tb=short {posargs}

pass_env =
    CARGO_HOME
    RUSTUP_HOME
    PATH
    HOME
    USERPROFILE
    # CI variables
    CI
    GITHUB_ACTIONS

[testenv:build]
# Smoke-test: only verify the package builds and imports correctly.
deps =
    maturin>=1.0,<2.0

commands_pre =
    maturin develop

commands =
    python -c "import physicsnemo_curator; print(f'OK: physicsnemo_curator imported from {physicsnemo_curator.__file__}')"
    python -c "from physicsnemo_curator._lib import vtk; print(f'OK: Rust extension loaded, vtk module available')"
