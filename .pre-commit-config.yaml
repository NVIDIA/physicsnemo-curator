repos:
# ── General file checks ──────────────────────────────────────────────────
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    - id: check-added-large-files
      args: [--maxkb=5000]
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-yaml
    - id: check-toml

# ── Python: Ruff (linting + formatting) ──────────────────────────────────
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
    - id: ruff-format
      exclude: ^(examples-old|benchmarks)/
    - id: ruff
      args: [--fix]
      exclude: ^(examples-old|benchmarks)/

# ── Python: Docstring coverage ───────────────────────────────────────────
-   repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
    - id: interrogate
      args: [
          "-vv", "--ignore-init-method", "--ignore-init-module",
          "--ignore-module", "--ignore-private", "--ignore-semiprivate",
          "--ignore-magic", "--fail-under=99",
          "-e", "setup.py", "-e", "test", "-e", "build", "-e", "docs",
          "-e", "examples-old", "-e", "benchmarks", "-e", ".asv",
          "--ignore-regex=forward", "--ignore-regex=backward",
          "--ignore-regex=reset_parameters", "--ignore-regex=extra_repr",
          "--ignore-regex=MetaData", "--ignore-regex=apply_activation",
          "--ignore-regex=exec_activation",
          "--color", "src/physicsnemo_curator/"]
      pass_filenames: false

# ── Markdown ─────────────────────────────────────────────────────────────
-   repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
    - id: markdownlint
      args: [--config, .markdownlint.json]
      exclude: ^examples-old/

# ── Local hooks (Rust tooling + ty) ──────────────────────────────────────
-   repo: local
    hooks:
    - id: ty
      name: ty (type checking)
      language: system
      entry: uv run ty check --exclude "examples-old/" --exclude "benchmarks/"
      types: [python]
      pass_filenames: false

    - id: cargo-fmt
      name: cargo fmt
      language: system
      entry: bash -c 'command -v cargo >/dev/null 2>&1 && cargo fmt --manifest-path src/rust/Cargo.toml -- --check || echo "cargo not found, skipping"'
      types: [rust]
      pass_filenames: false

    - id: cargo-clippy
      name: cargo clippy
      language: system
      entry: bash -c 'command -v cargo >/dev/null 2>&1 && cargo clippy --manifest-path src/rust/Cargo.toml -- -D warnings || echo "cargo not found, skipping"'
      types: [rust]
      pass_filenames: false

    - id: cargo-deny
      name: cargo deny
      language: system
      entry: bash -c 'command -v cargo >/dev/null 2>&1 && cargo deny --manifest-path src/rust/Cargo.toml check || echo "cargo not found, skipping"'
      types: [toml]
      pass_filenames: false

    - id: uv-lock
      name: uv lock --check
      language: system
      entry: uv lock --check
      files: pyproject\.toml$
      pass_filenames: false
